services:
  - type: web
    name: masterdata-kvalitetssjekk
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CACHE_DIR
        value: /var/data/cache
      - key: OUTPUT_DIR
        value: /var/data/output
      - key: HISTORY_DIR
        value: /var/data/history
    disk:
      name: masterdata-persistent
      mountPath: /var/data
      sizeGB: 1
